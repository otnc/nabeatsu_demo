name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (semver, e.g. 1.2.3, or patch/minor/major)"
        required: true

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) requires npm >= 11.5.1.
      - run: npm install -g npm@11

      - run: npm ci

      - name: Resolve target version
        id: version
        run: |
          current="$(node -p "require('./package.json').version")"
          input="${{ inputs.version }}"
          if [ "$input" = "$current" ]; then
            echo "package.json is already at $current; skipping version bump."
          else
            npm version "$input" --no-git-tag-version
          fi
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Ensure version isn't already published
        run: |
          name="$(node -p "require('./package.json').name")"
          version="${{ steps.version.outputs.version }}"
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "::error::$name@$version is already published to npm."
            exit 1
          fi

      - run: npm run typecheck

      - run: npm run build

      - name: Commit and tag version bump
        run: |
          version="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- package.json package-lock.json; then
            git add package.json package-lock.json
            git commit -m "chore: release v$version"
            git push
          fi
          if ! git ls-remote --exit-code --tags origin "refs/tags/v$version" >/dev/null 2>&1; then
            git tag "v$version"
            git push origin "v$version"
          fi

      # npm publish は取り消せない (unpublish には厳しい制限がある) ため、
      # commit/tag/push が確実に成功した後に最後に実行する。
      - run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          gh release create "v$version" --title "v$version" --generate-notes
